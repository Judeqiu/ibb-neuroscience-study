<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 900" width="1300" height="900">
  <defs>
    <style>
      .box { rx: 6; ry: 6; stroke-width: 1.5; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 12px; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }
      .small { font-size: 9.5px; font-weight: 400; }
      .title { font-size: 19px; font-weight: 700; }
      .arrow { stroke: #94a3b8; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8" />
    </marker>
  </defs>
  <rect width="1300" height="900" fill="#f8fafc" rx="12"/>
  <text x="650" y="30" class="text title" fill="#0f172a">IB Neuroscience — Concept Map</text>
  <text x="650" y="50" class="text small" fill="#64748b">Structure determines function; dysfunction reveals normal function</text>
  <rect x="510" y="65" width="280" height="28" class="box" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="650" y="83" class="text" fill="#1e40af">Development — Neural Plate → Neural Tube → Neural Crest</text>
  <line x1="560" y1="93" x2="280" y2="128" class="arrow"/>
  <line x1="740" y1="93" x2="1020" y2="128" class="arrow"/>
  <rect x="160" y="130" width="240" height="28" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="280" y="148" class="text" fill="#166534">CNS — Brain + Spinal Cord</text>
  <rect x="900" y="130" width="240" height="28" class="box" fill="#fef3c7" stroke="#d97706"/>
  <text x="1020" y="148" class="text" fill="#92400e">PNS — Nerves + Ganglia</text>
  <line x1="280" y1="158" x2="200" y2="192" class="arrow"/>
  <line x1="280" y1="158" x2="360" y2="192" class="arrow"/>
  <line x1="1020" y1="158" x2="1020" y2="192" class="arrow"/>
  <rect x="70" y="194" width="150" height="38" class="box" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="145" y="210" class="text" fill="#3730a3">Neurons</text>
  <text x="145" y="225" class="text small" fill="#4338ca">Cell body, dendrites, axon</text>
  <rect x="240" y="194" width="150" height="38" class="box" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="315" y="210" class="text" fill="#3730a3">Glial Cells (10:1)</text>
  <text x="315" y="225" class="text small" fill="#4338ca">Astrocytes, Oligodendrocytes, Microglia, Ependyma</text>
  <rect x="410" y="194" width="150" height="38" class="box" fill="#fce7f3" stroke="#db2777"/>
  <text x="485" y="210" class="text" fill="#9d174d">Myelin</text>
  <text x="485" y="225" class="text small" fill="#be185d">CNS: Oligodendro (multi-axon) | PNS: Schwann cell (1 axon)</text>
  <rect x="940" y="194" width="160" height="38" class="box" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="1020" y="210" class="text" fill="#854d0e">PNS Components</text>
  <text x="1020" y="225" class="text small" fill="#a16207">Schwann cells, DRG, spinal nerve roots</text>
  <line x1="145" y1="232" x2="145" y2="268" class="arrow"/>
  <line x1="315" y1="232" x2="315" y2="268" class="arrow"/>
  <line x1="485" y1="232" x2="485" y2="268" class="arrow"/>
  <rect x="60" y="270" width="170" height="38" class="box" fill="#ecfccb" stroke="#65a30d"/>
  <text x="145" y="286" class="text" fill="#3f6212">Spinal Cord</text>
  <text x="145" y="301" class="text small" fill="#4d7c0f">6 regions, Rexed laminae, 3 funiculi</text>
  <rect x="260" y="270" width="170" height="38" class="box" fill="#ecfccb" stroke="#65a30d"/>
  <text x="345" y="286" class="text" fill="#3f6212">Ascending / Descending Tracts</text>
  <text x="345" y="301" class="text small" fill="#4d7c0f">Corticospinal, DC-ML, Spinothalamic, Spinocerebellar</text>
  <rect x="460" y="270" width="170" height="38" class="box" fill="#ecfccb" stroke="#65a30d"/>
  <text x="545" y="286" class="text" fill="#3f6212">Dermatomes</text>
  <text x="545" y="301" class="text small" fill="#4d7c0f">C1–Co; 8 cervical nerves, 7 vertebrae</text>
  <line x1="145" y1="308" x2="100" y2="344" class="arrow"/>
  <line x1="200" y1="296" x2="420" y2="344" class="arrow"/>
  <rect x="700" y="258" width="240" height="28" class="box" fill="#fce7f3" stroke="#db2777"/>
  <text x="820" y="276" class="text" fill="#9d174d">Brainstem — Midbrain + Hindbrain (not pons-medulla)</text>
  <rect x="960" y="258" width="240" height="28" class="box" fill="#fce7f3" stroke="#db2777"/>
  <text x="1080" y="276" class="text" fill="#9d174d">Cerebellum — 3 peduncles, ipsilateral body connection</text>
  <line x1="820" y1="286" x2="500" y2="344" class="arrow"/>
  <line x1="1080" y1="286" x2="1080" y2="314" class="arrow"/>
  <rect x="50" y="346" width="140" height="38" class="box" fill="#fce7f3" stroke="#db2777"/>
  <text x="120" y="362" class="text" fill="#9d174d">Diencephalon</text>
  <text x="120" y="377" class="text small" fill="#be185d">Thalamus, Hypothalamus, Pretectum</text>
  <rect x="210" y="346" width="140" height="38" class="box" fill="#fce7f3" stroke="#db2777"/>
  <text x="280" y="362" class="text" fill="#9d174d">Telencephalon</text>
  <text x="280" y="377" class="text small" fill="#be185d">Cortex (6 layers), Basal Ganglia, Hippocampus, Amygdala</text>
  <rect x="370" y="346" width="140" height="38" class="box" fill="#fce7f3" stroke="#db2777"/>
  <text x="440" y="362" class="text" fill="#9d174d">Cranial Nerves</text>
  <text x="440" y="377" class="text small" fill="#be185d">CN 3–12 brainstem origin; SE/VE/BE/SA/VA/SS classification</text>
  <rect x="530" y="346" width="150" height="38" class="box" fill="#fce7f3" stroke="#db2777"/>
  <text x="605" y="362" class="text" fill="#9d174d">Ventricles &amp; CSF</text>
  <text x="605" y="377" class="text small" fill="#be185d">Lateral → 3rd → 4th → Subarachnoid space</text>
  <line x1="120" y1="384" x2="120" y2="424" class="arrow"/>
  <line x1="280" y1="384" x2="280" y2="424" class="arrow"/>
  <line x1="605" y1="384" x2="605" y2="424" class="arrow"/>
  <rect x="50" y="426" width="140" height="34" class="box" fill="#fef2f2" stroke="#ef4444"/>
  <text x="120" y="442" class="text" fill="#991b1b">Circle of Willis</text>
  <text x="120" y="455" class="text small" fill="#b91c1c">ICA + Vertebral → ACA, MCA, PCA</text>
  <rect x="210" y="426" width="140" height="34" class="box" fill="#fef2f2" stroke="#ef4444"/>
  <text x="280" y="442" class="text" fill="#991b1b">CSF Circulation</text>
  <text x="280" y="455" class="text small" fill="#b91c1c">Choroid plexus → Ventricles → Arachnoid granulations</text>
  <rect x="370" y="426" width="140" height="34" class="box" fill="#fef2f2" stroke="#ef4444"/>
  <text x="440" y="442" class="text" fill="#991b1b">Blood-Brain Barrier</text>
  <text x="440" y="455" class="text small" fill="#b91c1c">Tight junctions + Astrocyte end-feet</text>
  <rect x="530" y="426" width="150" height="34" class="box" fill="#fef2f2" stroke="#ef4444"/>
  <text x="605" y="442" class="text" fill="#991b1b">Staining &amp; Imaging</text>
  <text x="605" y="455" class="text small" fill="#b91c1c">Nissl, Golgi, Myelin, GFAP, MRI, CT, EEG, EMG</text>
  <rect x="50" y="496" width="155" height="42" class="box" fill="#f3e8ff" stroke="#9333ea"/>
  <text x="128" y="513" class="text" fill="#6b21a8">Motor Systems</text>
  <text x="128" y="528" class="text small" fill="#7e22ce">Corticospinal, Basal Ganglia, Cerebellum, α-MN final path</text>
  <rect x="220" y="496" width="155" height="42" class="box" fill="#f3e8ff" stroke="#9333ea"/>
  <text x="298" y="513" class="text" fill="#6b21a8">Sensory Systems</text>
  <text x="298" y="528" class="text small" fill="#7e22ce">DC-ML, Spinothalamic, Visual, Auditory, Somatosensory</text>
  <rect x="390" y="496" width="155" height="42" class="box" fill="#f3e8ff" stroke="#9333ea"/>
  <text x="468" y="513" class="text" fill="#6b21a8">Autonomic NS</text>
  <text x="468" y="528" class="text small" fill="#7e22ce">Sympathetic (T1–L2, NA) vs Parasympathetic (Craniosacral, ACh)</text>
  <rect x="560" y="496" width="155" height="42" class="box" fill="#f3e8ff" stroke="#9333ea"/>
  <text x="638" y="513" class="text" fill="#6b21a8">Special Senses</text>
  <text x="638" y="528" class="text small" fill="#7e22ce">Vision (V1), Hearing (A1), Balance, Smell, Taste (Insula)</text>
  <line x1="128" y1="538" x2="100" y2="588" class="arrow"/>
  <line x1="298" y1="538" x2="220" y2="588" class="arrow"/>
  <line x1="468" y1="538" x2="440" y2="588" class="arrow"/>
  <line x1="638" y1="538" x2="660" y2="588" class="arrow"/>
  <rect x="730" y="344" width="240" height="28" class="box" fill="#f0f9ff" stroke="#0ea5e9"/>
  <text x="850" y="362" class="text" fill="#0369a1">Sleep Mechanisms — VLPO Sleep Switch</text>
  <rect x="990" y="344" width="210" height="28" class="box" fill="#f0f9ff" stroke="#0ea5e9"/>
  <text x="1095" y="362" class="text" fill="#0369a1">Memory — Semantic vs Episodic (H.M.)</text>
  <line x1="850" y1="372" x2="850" y2="408" class="arrow"/>
  <line x1="1095" y1="372" x2="1095" y2="408" class="arrow"/>
  <rect x="730" y="410" width="240" height="28" class="box" fill="#f0f9ff" stroke="#0ea5e9"/>
  <text x="850" y="428" class="text" fill="#0369a1">Arousal centers: LC (NA), Raphe (5-HT), Tegmental (ACh), TMN (Histamine)</text>
  <rect x="990" y="410" width="210" height="28" class="box" fill="#f0f9ff" stroke="#0ea5e9"/>
  <text x="1095" y="428" class="text" fill="#0369a1">Hippocampus for formation; cortex for long-term storage</text>
  <rect x="30" y="590" width="115" height="42" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="88" y="606" class="text" fill="#991b1b">Stroke</text>
  <text x="88" y="621" class="text small" fill="#b91c1c">MCA, Internal capsule, "Time is brain"</text>
  <rect x="155" y="590" width="115" height="42" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="213" y="606" class="text" fill="#991b1b">Parkinson's</text>
  <text x="213" y="621" class="text small" fill="#b91c1c">Substantia nigra, Resting tremor, L-DOPA</text>
  <rect x="280" y="590" width="115" height="42" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="338" y="606" class="text" fill="#991b1b">Multiple Sclerosis</text>
  <text x="338" y="621" class="text small" fill="#b91c1c">Oligodendrocyte autoimmune demyelination</text>
  <rect x="405" y="590" width="115" height="42" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="463" y="606" class="text" fill="#991b1b">Alzheimer's</text>
  <text x="463" y="621" class="text small" fill="#b91c1c">Hippocampus, Aβ plaques, tau tangles</text>
  <rect x="530" y="590" width="115" height="42" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="588" y="606" class="text" fill="#991b1b">Epilepsy</text>
  <text x="588" y="621" class="text small" fill="#b91c1c">Cortical hyperexcitability, EEG diagnostic</text>
  <rect x="655" y="590" width="115" height="42" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="713" y="606" class="text" fill="#991b1b">Spastic vs Flaccid</text>
  <text x="713" y="621" class="text small" fill="#b91c1c">CST (spastic) vs Motor neuron (flaccid)</text>
  <rect x="780" y="590" width="115" height="42" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="838" y="606" class="text" fill="#991b1b">Meningitis</text>
  <text x="838" y="621" class="text small" fill="#b91c1c">CSF: elevated WBC, neck stiffness</text>
  <rect x="905" y="590" width="115" height="42" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="963" y="606" class="text" fill="#991b1b">Aphasia</text>
  <text x="963" y="621" class="text small" fill="#b91c1c">Wernicke (BA22) vs Broca (BA44–45)</text>
  <rect x="1030" y="590" width="115" height="42" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="1088" y="606" class="text" fill="#991b1b">Wernicke-Korsakoff</text>
  <text x="1088" y="621" class="text small" fill="#b91c1c">Thiamine def, Mammillary body atrophy</text>
  <rect x="1155" y="590" width="115" height="42" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="1213" y="606" class="text" fill="#991b1b">CJD / Prion Disease</text>
  <text x="1213" y="621" class="text small" fill="#b91c1c">PrPsc misfolding, Rapid dementia</text>
  <rect x="90" y="648" width="115" height="40" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="148" y="663" class="text" fill="#991b1b">ALS</text>
  <text x="148" y="677" class="text small" fill="#b91c1c">UMN + LMN degeneration</text>
  <rect x="215" y="648" width="115" height="40" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="273" y="663" class="text" fill="#991b1b">Huntington's</text>
  <text x="273" y="677" class="text small" fill="#b91c1c">CAG repeat, Striatum, Chorea</text>
  <rect x="340" y="648" width="115" height="40" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="398" y="663" class="text" fill="#991b1b">Cerebral Palsy</text>
  <text x="398" y="677" class="text small" fill="#b91c1c">Spastic, Ataxic, Athetoid, Mixed</text>
  <rect x="465" y="648" width="115" height="40" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="523" y="663" class="text" fill="#991b1b">Schizophrenia</text>
  <text x="523" y="677" class="text small" fill="#b91c1c">Dopamine/Serotonin, Auditory hallucinations</text>
  <rect x="590" y="648" width="115" height="40" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="648" y="663" class="text" fill="#991b1b">Depression</text>
  <text x="648" y="677" class="text small" fill="#b91c1c">1/3 lifetime prevalence, SSRIs, CBT</text>
  <rect x="715" y="648" width="115" height="40" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="773" y="663" class="text" fill="#991b1b">Bipolar Disorder</text>
  <text x="773" y="677" class="text small" fill="#b91c1c">Mania + Depression, Lithium, Valproate</text>
  <rect x="840" y="648" width="115" height="40" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="898" y="663" class="text" fill="#991b1b">OCD</text>
  <text x="898" y="677" class="text small" fill="#b91c1c">SSRIs reduce symptoms in ~60%</text>
  <rect x="965" y="648" width="115" height="40" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="1023" y="663" class="text" fill="#991b1b">ADHD</text>
  <text x="1023" y="677" class="text small" fill="#b91c1c">Inattention, hyperactivity, Methylphenidate</text>
  <rect x="1090" y="648" width="115" height="40" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="1148" y="663" class="text" fill="#991b1b">Autism Spectrum</text>
  <text x="1148" y="677" class="text small" fill="#b91c1c">Social/communication, NOT caused by vaccines</text>
  <rect x="100" y="720" width="1100" height="32" class="box" fill="#f1f5f9" stroke="#64748b"/>
  <text x="650" y="740" class="text" fill="#334155" font-size="13">Core Principle: Histological Structure → Anatomical Organization → Functional Circuitry → Clinical Signs When Disrupted</text>
  <text x="50" y="785" class="text small" fill="#64748b">Color Key:</text>
  <rect x="135" y="774" width="13" height="13" fill="#dbeafe" stroke="#3b82f6" rx="2"/>
  <text x="154" y="785" class="text small" fill="#475569">Development</text>
  <rect x="240" y="774" width="13" height="13" fill="#dcfce7" stroke="#16a34a" rx="2"/>
  <text x="259" y="785" class="text small" fill="#475569">CNS</text>
  <rect x="305" y="774" width="13" height="13" fill="#fef3c7" stroke="#d97706" rx="2"/>
  <text x="324" y="785" class="text small" fill="#475569">PNS</text>
  <rect x="375" y="774" width="13" height="13" fill="#fce7f3" stroke="#db2777" rx="2"/>
  <text x="394" y="785" class="text small" fill="#475569">Brain Regions / Spinal Cord</text>
  <rect x="540" y="774" width="13" height="13" fill="#fef2f2" stroke="#ef4444" rx="2"/>
  <text x="559" y="785" class="text small" fill="#475569">Blood Supply / CSF / Imaging</text>
  <rect x="720" y="774" width="13" height="13" fill="#f3e8ff" stroke="#9333ea" rx="2"/>
  <text x="739" y="785" class="text small" fill="#475569">Functional Systems</text>
  <rect x="860" y="774" width="13" height="13" fill="#f0f9ff" stroke="#0ea5e9" rx="2"/>
  <text x="879" y="785" class="text small" fill="#475569">Sleep / Memory / Language</text>
  <rect x="1030" y="774" width="13" height="13" fill="#fee2e2" stroke="#dc2626" rx="2"/>
  <text x="1049" y="785" class="text small" fill="#475569">Clinical Disorders (20 conditions)</text>
</svg>
