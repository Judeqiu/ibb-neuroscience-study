<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1100" width="1500" height="1100">
  <defs>
    <style>
      .box { rx: 8; ry: 8; stroke-width: 1.5; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }
      .small { font-size: 11px; font-weight: 400; }
      .title { font-size: 22px; font-weight: 700; }
      .subtitle { font-size: 13px; font-weight: 400; fill: #64748b; text-anchor: middle; }
      .arrow { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>
  <rect width="1500" height="1100" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="750" y="36" class="title" fill="#0f172a">IB Neuroscience — Concept Map</text>
  <text x="750" y="58" class="subtitle">Structure determines function; dysfunction reveals normal function</text>

  <!-- ===== ROW 1: Development ===== -->
  <rect x="510" y="80" width="480" height="40" class="box" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="750" y="104" class="text" fill="#1e40af">Development — Neural Plate → Neural Tube (CNS) + Neural Crest (PNS)</text>

  <line x1="600" y1="120" x2="300" y2="170" class="arrow"/>
  <line x1="900" y1="120" x2="1200" y2="170" class="arrow"/>

  <!-- ===== ROW 2: CNS vs PNS ===== -->
  <rect x="120" y="175" width="360" height="42" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="300" y="194" class="text" fill="#166534">CNS — Brain + Spinal Cord</text>
  <text x="300" y="210" class="text small" fill="#166534">Nuclei (cell bodies), Tracts (axon bundles), CNS glia</text>

  <rect x="1020" y="175" width="360" height="42" class="box" fill="#fef3c7" stroke="#d97706"/>
  <text x="1200" y="194" class="text" fill="#92400e">PNS — Nerves + Ganglia</text>
  <text x="1200" y="210" class="text small" fill="#92400e">Cranial &amp; spinal nerves, Dorsal root ganglia, Schwann cells</text>

  <line x1="200" y1="217" x2="140" y2="275" class="arrow"/>
  <line x1="300" y1="217" x2="300" y2="275" class="arrow"/>
  <line x1="400" y1="217" x2="460" y2="275" class="arrow"/>
  <line x1="1200" y1="217" x2="1200" y2="275" class="arrow"/>

  <!-- ===== ROW 3: Cells ===== -->
  <rect x="50" y="280" width="180" height="55" class="box" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="140" y="300" class="text" fill="#3730a3">Neurons</text>
  <text x="140" y="318" class="text small" fill="#4338ca">Cell body (soma), dendrites, axon</text>
  <text x="140" y="330" class="text small" fill="#4338ca">Voltage-gated channels, Nissl bodies</text>

  <rect x="250" y="280" width="190" height="55" class="box" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="345" y="300" class="text" fill="#3730a3">Glial Cells (outnumber neurons 10:1)</text>
  <text x="345" y="318" class="text small" fill="#4338ca">Astrocytes, Oligodendrocytes, Microglia, Ependyma</text>
  <text x="345" y="330" class="text small" fill="#4338ca">Active roles: recycle NTs, modulate synapses, immune</text>

  <rect x="460" y="280" width="190" height="55" class="box" fill="#fce7f3" stroke="#db2777"/>
  <text x="555" y="300" class="text" fill="#9d174d">Myelin — Electrical Insulator</text>
  <text x="555" y="318" class="text small" fill="#be185d">CNS: One oligodendrocyte → multiple axons</text>
  <text x="555" y="330" class="text small" fill="#be185d">PNS: One Schwann cell → one axon segment</text>

  <rect x="1080" y="280" width="220" height="55" class="box" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="1190" y="300" class="text" fill="#854d0e">PNS Components</text>
  <text x="1190" y="318" class="text small" fill="#a16207">Schwann cells (myelination), Satellite cells (support)</text>
  <text x="1190" y="330" class="text small" fill="#a16207">Dorsal root ganglia, Ventral roots (motor), Dorsal roots (sensory)</text>

  <line x1="140" y1="335" x2="140" y2="385" class="arrow"/>
  <line x1="345" y1="335" x2="345" y2="385" class="arrow"/>
  <line x1="555" y1="335" x2="555" y2="385" class="arrow"/>

  <!-- ===== ROW 4: Spinal Cord ===== -->
  <rect x="50" y="390" width="210" height="55" class="box" fill="#ecfccb" stroke="#65a30d"/>
  <text x="155" y="410" class="text" fill="#3f6212">Spinal Cord</text>
  <text x="155" y="428" class="text small" fill="#4d7c0f">6 functional regions (prebrachial to caudal)</text>
  <text x="155" y="440" class="text small" fill="#4d7c0f">Grey matter: Rexed laminae I–X, butterfly shape</text>

  <rect x="280" y="390" width="210" height="55" class="box" fill="#ecfccb" stroke="#65a30d"/>
  <text x="385" y="410" class="text" fill="#3f6212">Ascending / Descending Tracts</text>
  <text x="385" y="428" class="text small" fill="#4d7c0f">Corticospinal, DC-ML, Spinothalamic</text>
  <text x="385" y="440" class="text small" fill="#4d7c0f">Spinocerebellar (dorsal &amp; ventral)</text>

  <rect x="510" y="390" width="210" height="55" class="box" fill="#ecfccb" stroke="#65a30d"/>
  <text x="615" y="410" class="text" fill="#3f6212">Spinal Nerves &amp; Dermatomes</text>
  <text x="615" y="428" class="text small" fill="#4d7c0f">8 cervical (7 vertebrae), 12 thoracic, 5 lumbar, 5 sacral</text>
  <text x="615" y="440" class="text small" fill="#4d7c0f">Dermatomes: C1–Co skin strips per spinal nerve</text>

  <line x1="155" y1="445" x2="100" y2="500" class="arrow"/>
  <line x1="280" y1="430" x2="440" y2="500" class="arrow"/>

  <!-- ===== ROW 5a: Brainstem & Cerebellum ===== -->
  <rect x="770" y="345" width="320" height="42" class="box" fill="#fce7f3" stroke="#db2777"/>
  <text x="930" y="364" class="text" fill="#9d174d">Brainstem — Midbrain + Hindbrain (not pons-medulla!)</text>
  <text x="930" y="380" class="text small" fill="#be185d">CN 3–12 nuclei, vital centers, corridor for ascending/descending pathways</text>

  <rect x="1110" y="345" width="320" height="42" class="box" fill="#fce7f3" stroke="#db2777"/>
  <text x="1270" y="364" class="text" fill="#9d174d">Cerebellum (~80% of all brain neurons)</text>
  <text x="1270" y="380" class="text small" fill="#be185d">3 peduncles, ipsilateral body connection (double decussation)</text>

  <line x1="930" y1="387" x2="440" y2="500" class="arrow"/>
  <line x1="1270" y1="387" x2="1270" y2="435" class="arrow"/>

  <!-- ===== ROW 5b: Forebrain ===== -->
  <rect x="50" y="505" width="180" height="60" class="box" fill="#fce7f3" stroke="#db2777"/>
  <text x="140" y="528" class="text" fill="#9d174d">Diencephalon</text>
  <text x="140" y="544" class="text small" fill="#be185d">Thalamus (sensory relay, all senses except smell)</text>
  <text x="140" y="556" class="text small" fill="#be185d">Hypothalamus (survival behaviors, endocrine control)</text>

  <rect x="255" y="505" width="180" height="60" class="box" fill="#fce7f3" stroke="#db2777"/>
  <text x="345" y="528" class="text" fill="#9d174d">Telencephalon</text>
  <text x="345" y="544" class="text small" fill="#be185d">Neocortex (6 layers), Hippocampus (memory)</text>
  <text x="345" y="556" class="text small" fill="#be185d">Basal Ganglia (striatum + pallidum), Amygdala</text>

  <rect x="460" y="505" width="210" height="60" class="box" fill="#fce7f3" stroke="#db2777"/>
  <text x="565" y="528" class="text" fill="#9d174d">Cranial Nerves (CN 3–12)</text>
  <text x="565" y="544" class="text small" fill="#be185d">SE, VE, BE, SA, VA, SS functional classification</text>
  <text x="565" y="556" class="text small" fill="#be185d">CN 1 (Olfactory) &amp; CN 2 (Optic) from forebrain</text>

  <line x1="140" y1="565" x2="140" y2="620" class="arrow"/>
  <line x1="345" y1="565" x2="345" y2="620" class="arrow"/>
  <line x1="565" y1="565" x2="565" y2="620" class="arrow"/>

  <!-- ===== ROW 6: Blood Supply & Imaging ===== -->
  <rect x="50" y="625" width="180" height="55" class="box" fill="#fef2f2" stroke="#ef4444"/>
  <text x="140" y="645" class="text" fill="#991b1b">Circle of Willis</text>
  <text x="140" y="662" class="text small" fill="#b91c1c">ICA + Vertebral → ACA, MCA, PCA</text>
  <text x="140" y="674" class="text small" fill="#b91c1c">Anterior &amp; posterior communicating arteries</text>

  <rect x="255" y="625" width="180" height="55" class="box" fill="#fef2f2" stroke="#ef4444"/>
  <text x="345" y="645" class="text" fill="#991b1b">CSF Circulation</text>
  <text x="345" y="662" class="text small" fill="#b91c1c">Choroid plexus → Lateral → 3rd → 4th ventricle</text>
  <text x="345" y="674" class="text small" fill="#b91c1c">→ Subarachnoid space → Arachnoid granulations → Venous sinuses</text>

  <rect x="460" y="625" width="210" height="55" class="box" fill="#fef2f2" stroke="#ef4444"/>
  <text x="565" y="645" class="text" fill="#991b1b">Blood-Brain Barrier &amp; Imaging</text>
  <text x="565" y="662" class="text small" fill="#b91c1c">Tight junctions + Basement membrane + Astrocyte end-feet</text>
  <text x="565" y="674" class="text small" fill="#b91c1c">Stains: Nissl, Golgi, Myelin, GFAP | Imaging: MRI, CT, EEG, EMG</text>

  <!-- ===== ROW 7: Functional Systems ===== -->
  <rect x="50" y="720" width="200" height="55" class="box" fill="#f3e8ff" stroke="#9333ea"/>
  <text x="150" y="740" class="text" fill="#6b21a8">Motor Systems</text>
  <text x="150" y="758" class="text small" fill="#7e22ce">Corticospinal tract, Basal ganglia circuit</text>
  <text x="150" y="770" class="text small" fill="#7e22ce">α-Motor neuron = final common pathway</text>

  <rect x="275" y="720" width="200" height="55" class="box" fill="#f3e8ff" stroke="#9333ea"/>
  <text x="375" y="740" class="text" fill="#6b21a8">Sensory Systems</text>
  <text x="375" y="758" class="text small" fill="#7e22ce">DC-ML (touch), Spinothalamic (pain/temp)</text>
  <text x="375" y="770" class="text small" fill="#7e22ce">Visual (V1), Auditory (A1), Vestibular, Taste</text>

  <rect x="500" y="720" width="200" height="55" class="box" fill="#f3e8ff" stroke="#9333ea"/>
  <text x="600" y="740" class="text" fill="#6b21a8">Autonomic Nervous System</text>
  <text x="600" y="758" class="text small" fill="#7e22ce">Sympathetic (T1–L2, thoracolumbar, NA)</text>
  <text x="600" y="770" class="text small" fill="#7e22ce">Parasympathetic (Craniosacral, ACh)</text>

  <rect x="725" y="720" width="200" height="55" class="box" fill="#f3e8ff" stroke="#9333ea"/>
  <text x="825" y="740" class="text" fill="#6b21a8">Special Senses</text>
  <text x="825" y="758" class="text small" fill="#7e22ce">Vision (V1), Hearing (cochlea → A1)</text>
  <text x="825" y="770" class="text small" fill="#7e22ce">Balance (vestibular), Smell (piriform cortex), Taste (insula)</text>

  <!-- ===== ROW 8: Sleep & Memory ===== -->
  <rect x="950" y="505" width="240" height="55" class="box" fill="#f0f9ff" stroke="#0ea5e9"/>
  <text x="1070" y="525" class="text" fill="#0369a1">Sleep Mechanisms</text>
  <text x="1070" y="542" class="text small" fill="#0369a1">VLPO = sleep switch, inhibits arousal centers</text>
  <text x="1070" y="554" class="text small" fill="#0369a1">Arousal: LC (NA), Raphe (5-HT), Tegmental (ACh), TMN (Histamine)</text>

  <rect x="1210" y="505" width="230" height="55" class="box" fill="#f0f9ff" stroke="#0ea5e9"/>
  <text x="1325" y="525" class="text" fill="#0369a1">Memory Systems</text>
  <text x="1325" y="542" class="text small" fill="#0369a1">Semantic (facts) vs Episodic (personal experiences)</text>
  <text x="1325" y="554" class="text small" fill="#0369a1">Hippocampus = formation; Cortex = long-term storage</text>

  <line x1="1070" y1="560" x2="1070" y2="620" class="arrow"/>
  <line x1="1325" y1="560" x2="1325" y2="620" class="arrow"/>

  <rect x="950" y="625" width="240" height="42" class="box" fill="#f0f9ff" stroke="#0ea5e9"/>
  <text x="1070" y="650" class="text" fill="#0369a1">Aphasia &amp; Apraxia</text>

  <rect x="1210" y="625" width="230" height="42" class="box" fill="#f0f9ff" stroke="#0ea5e9"/>
  <text x="1325" y="650" class="text" fill="#0369a1">Wernicke (BA22) vs Broca (BA44–45)</text>

  <!-- ===== ROW 9: Clinical Disorders ===== -->
  <line x1="150" y1="775" x2="100" y2="830" class="arrow"/>
  <line x1="375" y1="775" x2="250" y2="830" class="arrow"/>
  <line x1="600" y1="775" x2="500" y2="830" class="arrow"/>
  <line x1="825" y1="775" x2="700" y2="830" class="arrow"/>

  <rect x="20" y="835" width="135" height="48" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="88" y="853" class="text" fill="#991b1b">Stroke</text>
  <text x="88" y="870" class="text small" fill="#b91c1c">MCA, Internal capsule, "Time is brain"</text>

  <rect x="165" y="835" width="135" height="48" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="233" y="853" class="text" fill="#991b1b">Parkinson's</text>
  <text x="233" y="870" class="text small" fill="#b91c1c">Substantia nigra, Resting tremor, L-DOPA</text>

  <rect x="310" y="835" width="135" height="48" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="378" y="853" class="text" fill="#991b1b">Multiple Sclerosis</text>
  <text x="378" y="870" class="text small" fill="#b91c1c">Autoimmune attack on oligodendrocytes, Demyelination</text>

  <rect x="455" y="835" width="135" height="48" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="523" y="853" class="text" fill="#991b1b">Alzheimer's</text>
  <text x="523" y="870" class="text small" fill="#b91c1c">Hippocampus, Aβ plaques, Tau tangles</text>

  <rect x="600" y="835" width="135" height="48" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="668" y="853" class="text" fill="#991b1b">Epilepsy</text>
  <text x="668" y="870" class="text small" fill="#b91c1c">Cortical hyperexcitability, EEG diagnostic</text>

  <rect x="745" y="835" width="135" height="48" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="813" y="853" class="text" fill="#991b1b">Spastic vs Flaccid</text>
  <text x="813" y="870" class="text small" fill="#b91c1c">CST damage (spastic) vs Motor neuron (flaccid)</text>

  <rect x="890" y="835" width="135" height="48" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="958" y="853" class="text" fill="#991b1b">Meningitis / Polio</text>
  <text x="958" y="870" class="text small" fill="#b91c1c">CSF: elevated WBC, Neck stiffness</text>

  <rect x="1035" y="835" width="135" height="48" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="1103" y="853" class="text" fill="#991b1b">Aphasia</text>
  <text x="1103" y="870" class="text small" fill="#b91c1c">Wernicke (BA22) vs Broca (BA44–45)</text>

  <rect x="1180" y="835" width="135" height="48" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="1248" y="853" class="text" fill="#991b1b">WKS / CJD</text>
  <text x="1248" y="870" class="text small" fill="#b91c1c">Thiamine def. / Prion disease</text>

  <rect x="1330" y="835" width="135" height="48" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="1398" y="853" class="text" fill="#991b1b">Cerebral Palsy</text>
  <text x="1398" y="870" class="text small" fill="#b91c1c">Spastic, Ataxic, Athetoid, Mixed</text>

  <!-- Clinical row 2 -->
  <rect x="95" y="900" width="135" height="42" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="163" y="916" class="text" fill="#991b1b">ALS</text>
  <text x="163" y="932" class="text small" fill="#b91c1c">UMN + LMN degeneration</text>

  <rect x="240" y="900" width="135" height="42" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="308" y="916" class="text" fill="#991b1b">Huntington's</text>
  <text x="308" y="932" class="text small" fill="#b91c1c">CAG repeat, Striatum, Chorea</text>

  <rect x="385" y="900" width="135" height="42" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="453" y="916" class="text" fill="#991b1b">Schizophrenia</text>
  <text x="453" y="932" class="text small" fill="#b91c1c">Dopamine/Serotonin, Hallucinations</text>

  <rect x="530" y="900" width="135" height="42" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="598" y="916" class="text" fill="#991b1b">Depression</text>
  <text x="598" y="932" class="text small" fill="#b91c1c">1/3 lifetime prevalence, SSRIs</text>

  <rect x="675" y="900" width="135" height="42" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="743" y="916" class="text" fill="#991b1b">Bipolar Disorder</text>
  <text x="743" y="932" class="text small" fill="#b91c1c">Mania + Depression, Lithium</text>

  <rect x="820" y="900" width="135" height="42" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="888" y="916" class="text" fill="#991b1b">OCD / ADHD</text>
  <text x="888" y="932" class="text small" fill="#b91c1c">SSRIs ~60% / Methylphenidate</text>

  <rect x="965" y="900" width="135" height="42" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="1033" y="916" class="text" fill="#991b1b">Autism Spectrum</text>
  <text x="1033" y="932" class="text small" fill="#b91c1c">NOT caused by vaccines (Wakefield retracted)</text>

  <rect x="1110" y="900" width="135" height="42" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="1178" y="916" class="text" fill="#991b1b">Tourette / Myasthenia</text>
  <text x="1178" y="932" class="text small" fill="#b91c1c">Motor/vocal tics / AChR antibodies</text>

  <rect x="1255" y="900" width="210" height="42" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="1360" y="916" class="text" fill="#991b1b">Spina Bifida (folate) / FAS (alcohol) / CP</text>
  <text x="1360" y="932" class="text small" fill="#b91c1c">Developmental insults — critical periods before/during pregnancy</text>

  <!-- Core principle -->
  <rect x="150" y="975" width="1200" height="38" class="box" fill="#f1f5f9" stroke="#64748b"/>
  <text x="750" y="998" class="text" fill="#334155" font-size="14">Core Principle: Histological Structure → Anatomical Organization → Functional Circuitry → Clinical Signs When Disrupted</text>

  <!-- Legend -->
  <text x="50" y="1045" class="text small" fill="#64748b">Color Key:</text>
  <rect x="135" y="1034" width="14" height="14" fill="#dbeafe" stroke="#3b82f6" rx="2"/>
  <text x="155" y="1045" class="text small" fill="#475569">Development</text>
  <rect x="255" y="1034" width="14" height="14" fill="#dcfce7" stroke="#16a34a" rx="2"/>
  <text x="275" y="1045" class="text small" fill="#475569">CNS</text>
  <rect x="325" y="1034" width="14" height="14" fill="#fef3c7" stroke="#d97706" rx="2"/>
  <text x="345" y="1045" class="text small" fill="#475569">PNS</text>
  <rect x="400" y="1034" width="14" height="14" fill="#fce7f3" stroke="#db2777" rx="2"/>
  <text x="420" y="1045" class="text small" fill="#475569">Brain Regions</text>
  <rect x="525" y="1034" width="14" height="14" fill="#ecfccb" stroke="#65a30d" rx="2"/>
  <text x="545" y="1045" class="text small" fill="#475569">Spinal Cord</text>
  <rect x="640" y="1034" width="14" height="14" fill="#fef2f2" stroke="#ef4444" rx="2"/>
  <text x="660" y="1045" class="text small" fill="#475569">Blood Supply / CSF / Imaging</text>
  <rect x="830" y="1034" width="14" height="14" fill="#f3e8ff" stroke="#9333ea" rx="2"/>
  <text x="850" y="1045" class="text small" fill="#475569">Functional Systems</text>
  <rect x="985" y="1034" width="14" height="14" fill="#f0f9ff" stroke="#0ea5e9" rx="2"/>
  <text x="1005" y="1045" class="text small" fill="#475569">Sleep / Memory / Language</text>
  <rect x="1170" y="1034" width="14" height="14" fill="#fee2e2" stroke="#dc2626" rx="2"/>
  <text x="1190" y="1045" class="text small" fill="#475569">Clinical Disorders (20 conditions)</text>
</svg>
