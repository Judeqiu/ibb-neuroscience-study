<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" width="900" height="650">
  <defs>
    <style>
      .box { rx: 8; ry: 8; stroke-width: 1.5; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 15px; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }
      .small { font-size: 12px; font-weight: 400; }
      .arrow { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8" />
    </marker>
  </defs>
  <rect width="900" height="650" fill="#f8fafc" rx="10"/>

  <!-- Row 1: Development -->
  <rect x="200" y="30" width="500" height="36" class="box" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="450" y="52" class="text" fill="#1e40af">Development: Neural Plate → Neural Tube (CNS) + Neural Crest (PNS)</text>

  <line x1="350" y1="66" x2="200" y2="115" class="arrow"/>
  <line x1="550" y1="66" x2="700" y2="115" class="arrow"/>

  <!-- Row 2 -->
  <rect x="60" y="120" width="280" height="50" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="200" y="140" class="text" fill="#166534">CNS: Brain + Spinal Cord</text>
  <text x="200" y="158" class="text small" fill="#166534">Neurons, Glial cells (10:1), Myelin (oligodendrocytes)</text>

  <rect x="560" y="120" width="280" height="50" class="box" fill="#fef3c7" stroke="#d97706"/>
  <text x="700" y="140" class="text" fill="#92400e">PNS: Nerves + Ganglia</text>
  <text x="700" y="158" class="text small" fill="#92400e">Schwann cells (1:1 myelination), spinal/cranial nerves</text>

  <line x1="200" y1="170" x2="120" y2="220" class="arrow"/>
  <line x1="300" y1="160" x2="400" y2="220" class="arrow"/>
  <line x1="700" y1="170" x2="780" y2="220" class="arrow"/>

  <!-- Row 3 -->
  <rect x="40" y="225" width="240" height="60" class="box" fill="#fce7f3" stroke="#db2777"/>
  <text x="160" y="248" class="text" fill="#9d174d">Brainstem &amp; Cerebellum</text>
  <text x="160" y="266" class="text small" fill="#be185d">Midbrain + Hindbrain (CN 3–12) | 3 peduncles</text>
  <text x="160" y="280" class="text small" fill="#be185d">Cerebellum: ipsilateral, ~80% of all neurons</text>

  <rect x="310" y="225" width="280" height="60" class="box" fill="#fce7f3" stroke="#db2777"/>
  <text x="450" y="248" class="text" fill="#9d174d">Forebrain Structures</text>
  <text x="450" y="266" class="text small" fill="#be185d">Thalamus (sensory relay) | Hypothalamus (survival, endocrine)</text>
  <text x="450" y="280" class="text small" fill="#be185d">Cortex (6 layers, 180 Brodmann areas) | Basal ganglia | Hippocampus</text>

  <rect x="620" y="225" width="240" height="60" class="box" fill="#ecfccb" stroke="#65a30d"/>
  <text x="740" y="248" class="text" fill="#3f6212">Spinal Cord &amp; Tracts</text>
  <text x="740" y="266" class="text small" fill="#4d7c0f">6 regions, Rexed laminae, dermatomes</text>
  <text x="740" y="280" class="text small" fill="#4d7c0f">Corticospinal, DC-ML, Spinothalamic, Spinocerebellar</text>

  <line x1="160" y1="285" x2="100" y2="340" class="arrow"/>
  <line x1="450" y1="285" x2="450" y2="340" class="arrow"/>
  <line x1="740" y1="285" x2="800" y2="340" class="arrow"/>

  <!-- Row 4 -->
  <rect x="40" y="345" width="240" height="55" class="box" fill="#fef2f2" stroke="#ef4444"/>
  <text x="160" y="365" class="text" fill="#991b1b">Blood Supply &amp; CSF</text>
  <text x="160" y="383" class="text small" fill="#b91c1c">Circle of Willis (ICA + Vertebral → ACA, MCA, PCA)</text>
  <text x="160" y="396" class="text small" fill="#b91c1c">CSF: Choroid plexus → Ventricles → Arachnoid granulations</text>

  <rect x="310" y="345" width="280" height="55" class="box" fill="#fef2f2" stroke="#ef4444"/>
  <text x="450" y="365" class="text" fill="#991b1b">Staining &amp; Imaging</text>
  <text x="450" y="383" class="text small" fill="#b91c1c">Nissl, Golgi, Myelin, GFAP, NeuN, ChAT</text>
  <text x="450" y="396" class="text small" fill="#b91c1c">MRI (soft tissue), CT (hemorrhage), EEG (epilepsy), EMG, NCS, LP</text>

  <rect x="620" y="345" width="240" height="55" class="box" fill="#f0f9ff" stroke="#0ea5e9"/>
  <text x="740" y="365" class="text" fill="#0369a1">Sleep, Memory &amp; Language</text>
  <text x="740" y="383" class="text small" fill="#0369a1">VLPO sleep switch | 90-min cycles | Semantic vs Episodic</text>
  <text x="740" y="396" class="text small" fill="#0369a1">Aphasia: Wernicke (BA22) vs Broca (BA44–45) | Apraxia</text>

  <line x1="160" y1="400" x2="160" y2="455" class="arrow"/>
  <line x1="450" y1="400" x2="300" y2="455" class="arrow"/>
  <line x1="740" y1="400" x2="650" y2="455" class="arrow"/>

  <!-- Row 5: Functional Systems -->
  <rect x="40" y="460" width="240" height="55" class="box" fill="#f3e8ff" stroke="#9333ea"/>
  <text x="160" y="480" class="text" fill="#6b21a8">Motor &amp; Sensory Systems</text>
  <text x="160" y="498" class="text small" fill="#7e22ce">Corticospinal, Basal Ganglia, Cerebellum, α-MN final path</text>
  <text x="160" y="512" class="text small" fill="#7e22ce">DC-ML vs Spinothalamic | Visual, Auditory, Vestibular, Olfactory</text>

  <rect x="310" y="460" width="280" height="55" class="box" fill="#f3e8ff" stroke="#9333ea"/>
  <text x="450" y="480" class="text" fill="#6b21a8">Autonomic Nervous System</text>
  <text x="450" y="498" class="text small" fill="#7e22ce">Symp (T1–L2, paravertebral, NA, fight/flight)</text>
  <text x="450" y="512" class="text small" fill="#7e22ce">Parasymp (Craniosacral, near-organ, ACh, rest/digest) | Enteric NS</text>

  <rect x="620" y="460" width="240" height="55" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="740" y="480" class="text" fill="#991b1b">Clinical — 16 Key Disorders</text>
  <text x="740" y="498" class="text small" fill="#b91c1c">Stroke, Parkinson's, MS, Alzheimer's, Epilepsy, ALS,</text>
  <text x="740" y="512" class="text small" fill="#b91c1c">Huntington's, CP, Meningitis, WKS, CJD, Spina bifida...</text>

  <!-- Link to full map -->
  <rect x="250" y="550" width="400" height="40" class="box" fill="#f1f5f9" stroke="#64748b"/>
  <text x="450" y="574" class="text" fill="#2563eb" font-size="14">🗺️  Open Full-Size Interactive Concept Map →</text>

  <!-- Core principle -->
  <rect x="120" y="605" width="660" height="32" class="box" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="450" y="625" class="text small" fill="#475569">Core Principle: Histological Structure → Anatomical Organization → Functional Circuitry → Clinical Signs When Disrupted</text>
</svg>
