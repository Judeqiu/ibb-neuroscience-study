<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concept Map — IB Neuroscience</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8fafc; color: #1a1a2e; }
.header { padding: 12px 24px; background: #fff; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 10; }
.header a { color: #2563eb; text-decoration: none; font-size: 14px; font-weight: 500; }
.header a:hover { text-decoration: underline; }
.header h1 { font-size: 18px; font-weight: 700; }
#chart { width: 100%; height: calc(100vh - 52px); overflow: auto; cursor: grab; }
#chart:active { cursor: grabbing; }
#chart svg { display: block; }
.node { position: absolute; border-radius: 8px; padding: 10px 14px; border: 1.8px solid; font-size: 12px; line-height: 1.45; max-width: 260px; pointer-events: auto; cursor: default; }
.node .title { font-size: 13px; font-weight: 700; margin-bottom: 3px; line-height: 1.25; }
.node .desc { font-size: 11px; color: #475569; line-height: 1.4; }
.link { fill: none; stroke: #94a3b8; stroke-width: 2; }
.legend { position: fixed; bottom: 16px; left: 16px; display: flex; flex-wrap: wrap; gap: 10px; padding: 10px 14px; background: #fff; border-radius: 8px; border: 1px solid #e2e8f0; z-index: 5; font-size: 11px; }
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="header">
  <a href="index.html">← Back to Study Hub</a>
  <h1>IB Neuroscience — Concept Map</h1>
  <span style="font-size:12px;color:#94a3b8;margin-left:auto">Scroll to zoom · Drag to pan · Click node to collapse</span>
</div>
<div id="chart"></div>
<div class="legend" id="legend"></div>

<script>
const data = {
  name: "Development: Neural Plate → Neural Tube (CNS) + Neural Crest (PNS)",
  color: "#dbeafe", border: "#3b82f6", textColor: "#1e40af",
  detail: "14,000 genes | Shh (ventral/motor) vs BMP/Wnt (dorsal/sensory) | Hox genes pattern hindbrain r2–r11 | Otx2 (forebrain), Gbx2 (hindbrain)",
  children: [
    {
      name: "CNS: Brain + Spinal Cord",
      color: "#dcfce7", border: "#16a34a", textColor: "#166534",
      detail: "Nuclei (cell bodies), Tracts (axon bundles) | Glia: Astrocytes, Oligodendrocytes, Microglia, Ependyma",
      children: [
        {
          name: "Oligodendrocytes (CNS Myelin)",
          color: "#fce7f3", border: "#db2777", textColor: "#9d174d",
          detail: "ONE cell → MANY axons | More glycolipid | No basal lamina | CNS axons do NOT regenerate",
          children: [
            {
              name: "Spinal Cord",
              color: "#ecfccb", border: "#65a30d", textColor: "#3f6212",
              detail: "6 regions (C1–Co2) | Rexed laminae I–X | Dorsal horn (sensory) | Ventral horn (motor, lamina 9) | Lamina 5: pattern generators",
              children: [
                {
                  name: "Corticospinal Tract (Motor)",
                  color: "#f3e8ff", border: "#9333ea", textColor: "#6b21a8",
                  detail: "Primary motor cortex → Internal capsule → Medullary pyramid → Pyramidal decussation (crosses) → Spinal cord | Controls fine distal limb movements",
                  children: [
                    { name: "Stroke", color: "#fee2e2", border: "#dc2626", textColor: "#991b1b", detail: "MCA most common | Internal capsule vulnerable | Contralateral spastic paralysis | Ischemic (80%) vs Hemorrhagic | 'Time is brain'" },
                    { name: "Spastic Paralysis (CST damage)", color: "#fee2e2", border: "#dc2626", textColor: "#991b1b", detail: "↑ tone, ↑ reflexes, Babinski (+), minimal atrophy | Opposite of flaccid (LMN damage): ↓ tone, ↓ reflexes, atrophy" },
                    { name: "ALS", color: "#fee2e2", border: "#dc2626", textColor: "#991b1b", detail: "UMN + LMN degeneration | Progressive weakness → respiratory failure | 'Amyotrophic' = LMN | 'Lateral sclerosis' = CST gliosis | Fatal ~3 years" }
                  ]
                },
                {
                  name: "DC-ML & Spinothalamic (Sensory)",
                  color: "#f3e8ff", border: "#9333ea", textColor: "#6b21a8",
                  detail: "DC-ML (touch/proprioception): crosses in HINDBRAIN | Spinothalamic (pain/temp): crosses in SPINAL CORD | Both: 3-neuron chain → thalamus → cortex",
                  children: [
                    { name: "Multiple Sclerosis", color: "#fee2e2", border: "#dc2626", textColor: "#991b1b", detail: "Autoimmune attack on oligodendrocytes → CNS demyelination | Relapsing-remitting | MRI: plaques | CSF: oligoclonal bands | Optic neuritis often first episode" }
                  ]
                },
                { name: "Spinal Nerves & Dermatomes", color: "#ecfccb", border: "#65a30d", textColor: "#3f6212", detail: "8 cervical (7 vert.), 12 thoracic, 5 lumbar, 5 sacral | Each nerve supplies a specific dermatome" }
              ]
            },
            {
              name: "Nodes of Ranvier & Saltatory Conduction",
              color: "#fce7f3", border: "#db2777", textColor: "#9d174d",
              detail: "Gaps between myelin segments | Na⁺ channels at nodes | AP jumps node-to-node, 10–100× faster | Demyelination: 10× slower conduction",
              children: []
            }
          ]
        },
        {
          name: "Astrocytes & Other Glia",
          color: "#e0e7ff", border: "#6366f1", textColor: "#3730a3",
          detail: "Astrocytes: recycle NTs, modulate synapses, K⁺ balance, BBB | Microglia: CNS immune (bone marrow-derived) | Ependyma: line ventricles, CSF | Glial tumors: astrocytomas, glioblastomas",
          children: []
        },
        {
          name: "Brainstem = Midbrain + Hindbrain",
          color: "#fce7f3", border: "#db2777", textColor: "#9d174d",
          detail: "NOT 'midbrain-pons-medulla'! | CN 3–12 nuclei | Vital centers | Corridor for pathways | Precerebellar nuclei: Inferior olive (climbing fibers), Pontine nuclei (mossy fibers)",
          children: [
            {
              name: "Cerebellum (~80% of neurons)",
              color: "#fce7f3", border: "#db2777", textColor: "#9d174d",
              detail: "3 peduncles | Ipsilateral (double decussation) | Granule cells = 70% of all neurons | Real-time motor coordination | Damage: ataxia, intention tremor",
              children: []
            },
            {
              name: "Cranial Nerves (CN 3–12)",
              color: "#fce7f3", border: "#db2777", textColor: "#9d174d",
              detail: "Functional classification: SE, VE, BE, SA, VA, SS | CN 1 & 2 from forebrain | CN 3,4,6: eye muscles | CN 5: face sensation/mastication | CN 7: face muscles/taste | CN 8: hearing/balance | CN 9,10: throat/viscera | CN 12: tongue",
              children: []
            }
          ]
        }
      ]
    },
    {
      name: "PNS: Nerves + Ganglia",
      color: "#fef3c7", border: "#d97706", textColor: "#92400e",
      detail: "Ganglia (cell bodies) | Nerves (axon bundles + connective tissue) | Schwann cells: ONE cell → ONE axon segment | Cranial & spinal nerves",
      children: [
        {
          name: "Schwann Cells (PNS Myelin)",
          color: "#fef9c3", border: "#ca8a04", textColor: "#92400e",
          detail: "ONE cell → ONE axon segment | More phospholipid | Has basal lamina + endoneurium | PNS axons CAN regenerate | Chain of Schwann cells needed per axon",
          children: [
            { name: "Guillain-Barré / Peripheral Neuropathy", color: "#fee2e2", border: "#dc2626", textColor: "#991b1b", detail: "PNS demyelination | Ascending flaccid paralysis | Diabetes/alcohol → longest nerves first (glove-and-stocking numbness)" },
            { name: "Myasthenia Gravis", color: "#fee2e2", border: "#dc2626", textColor: "#991b1b", detail: "Autoimmune: antibodies block postsynaptic ACh receptors at NMJ | Exercise-dependent weakness | Treatment: immunosuppressants + thymectomy" }
          ]
        }
      ]
    },
    {
      name: "Forebrain: Diencephalon + Telencephalon",
      color: "#fce7f3", border: "#db2777", textColor: "#9d174d",
      detail: "Thalamus: sensory relay (all except smell) | Hypothalamus: survival behaviors, endocrine | Cortex: 6 layers, 180 Brodmann areas | Basal ganglia: striatum + pallidum | Hippocampus: memory | Amygdala: fear",
      children: [
        {
          name: "Sleep & Memory",
          color: "#f0f9ff", border: "#0ea5e9", textColor: "#0369a1",
          detail: "VLPO sleep switch → inhibits arousal centers (LC/NA, Raphe/5-HT, Tegmental/ACh, TMN/Histamine) | 90-min cycles | Semantic vs Episodic memory (H.M. case) | Hippocampus = formation, Cortex = storage",
          children: [
            { name: "Alzheimer's Disease", color: "#fee2e2", border: "#dc2626", textColor: "#991b1b", detail: "Begins in hippocampus → memory loss | Aβ plaques (extracellular) + Tau tangles (intracellular) | Most common dementia (~65%) | Death ~4 years from diagnosis" }
          ]
        },
        {
          name: "Aphasia & Apraxia",
          color: "#f0f9ff", border: "#0ea5e9", textColor: "#0369a1",
          detail: "Wernicke receptive (BA22): fluent but meaningless, poor comprehension | Broca expressive (BA44–45): non-fluent, agrammatical, good comprehension | Apraxia: can't perform skilled movements on command (parietal/prefrontal damage)",
          children: []
        },
        {
          name: "Basal Ganglia Disorders",
          color: "#fee2e2", border: "#dc2626", textColor: "#991b1b",
          detail: "Parkinson's: substantia nigra degeneration → resting tremor, rigidity, bradykinesia, L-DOPA, DBS | Huntington's: autosomal dominant, CAG repeat, striatum degeneration, chorea, onset 35–50",
          children: []
        }
      ]
    },
    {
      name: "Autonomic Nervous System (2-neuron chain)",
      color: "#f3e8ff", border: "#9333ea", textColor: "#6b21a8",
      detail: "Sympathetic: T1–L2, paravertebral chain, short pre/long post, NA (fight/flight) | Parasympathetic: CN 3,7,9,10 + S2–S4, near-organ, long pre/short post, ACh (rest/digest) | Enteric NS: 200–600M gut neurons",
      children: []
    },
    {
      name: "Blood Supply & CSF",
      color: "#fef2f2", border: "#ef4444", textColor: "#991b1b",
      detail: "Circle of Willis: ICA + Vertebral → ACA (leg), MCA (face/arm/speech), PCA (vision) | CSF: Choroid plexus → Ventricles → Subarachnoid → Arachnoid granulations → SSS | BBB: tight junctions + basement membrane + astrocyte end-feet",
      children: [
        { name: "Meningitis / Hydrocephalus", color: "#fee2e2", border: "#dc2626", textColor: "#991b1b", detail: "Meningitis: fever, headache, neck stiffness, ↑WBC in CSF | Hydrocephalus: obstructed CSF flow → ventricular enlargement → shunt" }
      ]
    },
    {
      name: "Staining & Imaging",
      color: "#fef2f2", border: "#ef4444", textColor: "#991b1b",
      detail: "Nissl (RER), Golgi (full neuron), Myelin (Luxol fast blue), GFAP (astrocytes) | MRI (soft tissue, MS), CT (hemorrhage, bone), EEG (epilepsy), EMG/NCS (nerve/muscle), Lumbar puncture (CSF)",
      children: []
    }
  ]
};

const W = 2800, H = 2200;
const chart = d3.select("#chart");
const svg = chart.append("svg").attr("width", W).attr("height", H).attr("viewBox", [0, 0, W, H]);
const g = svg.append("g");

const root = d3.hierarchy(data);
const treeLayout = d3.tree().size([H - 120, W - 400]).separation((a, b) => (a.parent === b.parent ? 1.4 : 2));
treeLayout(root);

// Draw links
g.selectAll(".link").data(root.links()).join("path")
  .attr("class", "link")
  .attr("d", d3.linkHorizontal().x(d => d.y).y(d => d.x));

// Draw nodes
const node = g.selectAll(".node").data(root.descendants()).join("foreignObject")
  .attr("x", d => d.y - 130).attr("y", d => d.x - 28)
  .attr("width", 260).attr("height", d => 28 + (d.data.detail ? 36 : 0) + (d.data.children && d.data.children.length > 0 ? 0 : 0))
  .attr("class", "node-container")
  .html(d => {
    const hasKids = d.data.children && d.data.children.length > 0;
    const detail = d.data.detail || "";
    const h = 28 + (detail ? 40 : 0);
    return `<div class="node" style="background:${d.data.color};border-color:${d.data.border};min-height:${h}px">
      <div class="title" style="color:${d.data.textColor}">${d.data.name}${hasKids ? ' ▸' : ''}</div>
      ${detail ? '<div class="desc">' + detail + '</div>' : ''}
    </div>`;
  })
  .attr("height", function() {
    const d = d3.select(this).datum();
    const el = this.querySelector('.node');
    return el ? el.offsetHeight + 8 : 80;
  })
  .on("click", function(event, d) {
    if (d.children && d.children.length > 0) {
      d._children = d.children;
      d.children = null;
    } else if (d._children) {
      d.children = d._children;
      d._children = null;
    }
    update(d);
  });

// Collapse all children initially (except first 2 levels)
root.children.forEach(c => {
  if (c.children) c.children.forEach(gc => {
    if (gc.children) gc.children.forEach(ggc => {
      if (ggc.children && ggc.depth > 3) {
        ggc._children = ggc.children;
        ggc.children = null;
      }
    });
  });
});

function update(source) {
  treeLayout(root);
  const nodes = root.descendants();
  const links = root.links();

  g.selectAll(".link").data(links).join("path")
    .attr("class", "link")
    .transition().duration(400)
    .attr("d", d3.linkHorizontal().x(d => d.y).y(d => d.x));

  const fo = g.selectAll(".node-container").data(nodes, d => d.data.name)
    .join("foreignObject")
    .attr("x", d => d.y - 130).attr("y", d => d.x - 28)
    .attr("width", 260).attr("height", 100)
    .html(d => {
      const hasKids = (d.children && d.children.length > 0) || (d._children && d._children.length > 0);
      const detail = d.data.detail || "";
      return `<div class="node" style="background:${d.data.color};border-color:${d.data.border}">
        <div class="title" style="color:${d.data.textColor}">${d.data.name}${hasKids ? (d.children ? ' ▾' : ' ▸') : ''}</div>
        ${detail ? '<div class="desc">' + detail + '</div>' : ''}
      </div>`;
    })
    .attr("height", function() { const el = this.querySelector('.node'); return el ? el.offsetHeight + 8 : 80; })
    .on("click", function(event, d) {
      if (d.children && d.children.length > 0) {
        d._children = d.children; d.children = null;
      } else if (d._children && d._children.length > 0) {
        d.children = d._children; d._children = null;
      }
      update(d);
    });
}

update(root);

// Legend
const legend = d3.select("#legend");
const colors = [
  ["#dbeafe","#3b82f6","Development"],["#dcfce7","#16a34a","CNS / Neurons"],["#fef3c7","#d97706","PNS"],
  ["#fce7f3","#db2777","Brain Regions / Myelin"],["#ecfccb","#65a30d","Spinal Cord"],["#fef2f2","#ef4444","Blood Supply / CSF / Imaging"],
  ["#f3e8ff","#9333ea","Functional Systems"],["#f0f9ff","#0ea5e9","Sleep / Memory / Language"],["#fee2e2","#dc2626","Clinical Disorders"]
];
colors.forEach(c => {
  legend.append("div").attr("class","legend-item")
    .html(`<div class="legend-dot" style="background:${c[0]};border:1.5px solid ${c[1]}"></div> ${c[2]}`);
});

// Pan & zoom
let zoom = d3.zoom().scaleExtent([0.3, 3]).on("zoom", (e) => g.attr("transform", e.transform));
svg.call(zoom);
svg.call(zoom.transform, d3.zoomIdentity.translate(60, 40).scale(0.55));
</script>
</body>
</html>
